set default=0
set timeout=10

menuentry "BanJiuOS" {
    echo "Loading BanJiuOS kernel..."
    linux /System/kernel.zyxt root=/dev/sda2 ro quiet
    initrd /System/initramfs.img
}

menuentry "BanJiuOS (Verbose)" {
    echo "Loading BanJiuOS kernel (verbose mode)..."
    linux /System/kernel.zyxt root=/dev/sda2 ro debug
    initrd /System/initramfs.img
}

menuentry "BanJiuOS (Safe Mode)" {
    echo "Loading BanJiuOS kernel (safe mode)..."
    linux /System/kernel.zyxt root=/dev/sda2 ro single
    initrd /System/initramfs.img
}

menuentry "Boot from USB" {
    echo "Searching for USB devices..."
    chainloader (hd1)/EFI/BOOT/BOOTX64.EFI
}

menuentry "System Setup (BIOS)" {
    echo "Rebooting into system setup..."
    reboot
}

menuentry "Reboot" {
    echo "Rebooting system..."
    reboot
}

menuentry "Shutdown" {
    echo "Shutting down system..."
    halt
}
